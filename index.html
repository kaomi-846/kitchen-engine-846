<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Engine 846 SAFE FULL SYSTEM</title>

<style>
body{font-family:sans-serif;background:#f6f2ec;margin:0;padding:12px}
h1{font-size:18px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08)}
input,select{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #ccc}
button{padding:6px 8px;margin:2px;border:none;border-radius:6px;background:#6b4f3b;color:white;font-size:12px}
.small{font-size:12px;color:#666}
.step{border-bottom:1px solid #eee;padding:6px 0}
</style>
</head>

<body>

<h1>🏭 Kitchen Engine 846（SAFE FULL SYSTEM）</h1>

<!-- ================= 製造日 ================= -->
<div class="card">
<h3>📅 製造日</h3>
<input id="prod_date" type="date">
</div>

<!-- ================= 原材料 ================= -->
<div class="card">
<h3>🧂 原材料マスタ</h3>

<input id="ing_name" placeholder="原材料名">
<input id="ing_brand" placeholder="ブランド">
<input id="ing_category" placeholder="カテゴリ">
<input id="ing_qty" type="number" placeholder="規格数量">
<input id="ing_unit" placeholder="単位">
<input id="ing_price" type="number" placeholder="価格">

<button onclick="addIngredient()">追加</button>

<div id="ing_list"></div>
</div>

<!-- ================= レシピ ================= -->
<div class="card">
<h3>📘 レシピ</h3>

<input id="recipe_name" placeholder="レシピ名">
<select id="recipe_item"></select>
<input id="recipe_amount" placeholder="使用量">

<button onclick="addItem()">材料追加</button>
<button onclick="saveRecipe()">保存</button>

<div id="recipe_list"></div>
<div id="recipe_saved"></div>
</div>

<!-- ================= 工程テンプレ ================= -->
<div class="card">
<h3>⚙️ 工程テンプレ</h3>

<input id="tpl_name" placeholder="テンプレ名">
<input id="tpl_steps" placeholder="工程カンマ区切り">

<button onclick="addTemplate()">保存</button>
<button onclick="applyTemplate()">適用</button>

<div id="tpl_list"></div>
<div id="steps"></div>
</div>

<!-- ================= 製造情報 ================= -->
<div class="card">
<h3>🏭 製造情報</h3>

<input id="lot_code" placeholder="ロット">
<input id="qty" type="number" placeholder="出来高">
</div>

<!-- ================= 経費 ================= -->
<div class="card">
<h3>💡 経費</h3>

<input id="cost_bottle_unit" type="number" placeholder="瓶">
<input id="cost_label_unit" type="number" placeholder="ラベル">
<input id="cost_pack_unit" type="number" placeholder="包装">

<input id="cost_labor_batch" type="number" placeholder="人件費">
<input id="cost_utilities_batch" type="number" placeholder="光熱費">
<input id="cost_other_batch" type="number" placeholder="その他">
</div>

<!-- ================= 原価 ================= -->
<div class="card">
<h3>💰 原価</h3>
<button onclick="calcCost()">計算</button>
<div id="cost"></div>
</div>

<!-- ================= バックアップ ================= -->
<div class="card">
<h3>☁️ データ保存・復元（重要）</h3>

<button onclick="backup()">💾 全データ保存</button>
<button onclick="restore()">♻ 復元</button>

<input type="file" id="fileInput" onchange="importFile(event)">

<div id="status"></div>
</div>

<script>

// ================= 全データ =================
let ingredients=[];
let recipes=[];
let templates=[];
let currentItems=[];
let steps=[];

// ================= 初期ロード =================
window.onload=function(){

let saved=localStorage.getItem("FULL_DATA");
if(saved){
let data=JSON.parse(saved);
ingredients=data.ingredients||[];
recipes=data.recipes||[];
templates=data.templates||[];
}

renderAll();
}

// ================= 保存 =================
function saveLocal(){
localStorage.setItem("FULL_DATA",JSON.stringify({
ingredients,recipes,templates
}));
}

// ================= 原材料 =================
function addIngredient(){
ingredients.push({
name:ing_name.value,
brand:ing_brand.value,
category:ing_category.value,
qty:Number(ing_qty.value),
unit:ing_unit.value,
price:Number(ing_price.value)
});
saveLocal();
renderAll();
clearInputs();
}

function clearInputs(){
ing_name.value="";
ing_brand.value="";
ing_category.value="";
ing_qty.value="";
ing_unit.value="";
ing_price.value="";
}

// ================= レシピ =================
function addItem(){
currentItems.push({
name:recipe_item.value,
amount:Number(recipe_amount.value||0)
});
renderRecipe();
}

function saveRecipe(){
recipes.push({
name:recipe_name.value,
items:currentItems
});
saveLocal();
currentItems=[];
renderAll();
}

// ================= テンプレ =================
function addTemplate(){
templates.push({
name:tpl_name.value,
steps:tpl_steps.value.split(",").map(s=>s.trim())
});
saveLocal();
renderAll();
}

function applyTemplate(){
let t=templates.find(x=>x.name===tpl_select.value);
if(!t)return;
steps=[...t.steps];
renderSteps();
}

// ================= バックアップ =================
function backup(){

let data={
ingredients,recipes,templates
};

let blob=new Blob(
["\uFEFF"+JSON.stringify(data,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="kitchen_backup.json";
a.click();

status.innerHTML="保存完了";
}

// ================= 復元 =================
function importFile(e){
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(){
let data=JSON.parse(reader.result);

ingredients=data.ingredients||[];
recipes=data.recipes||[];
templates=data.templates||[];

saveLocal();
renderAll();

status.innerHTML="復元完了";
};

reader.readAsText(file);
}

// ================= 表示 =================
function renderAll(){
renderIng();
renderRecipes();
renderTemplates();
renderSelect();
}

function renderIng(){
ing_list.innerHTML="";
ingredients.forEach(i=>{
ing_list.innerHTML+=`<div class="small">${i.name} ${i.price}円</div><hr>`;
});
}

function renderRecipes(){
recipe_saved.innerHTML="";
recipes.forEach(r=>{
recipe_saved.innerHTML+=`<div class="small">${r.name}</div>`;
});
}

function renderTemplates(){
tpl_list.innerHTML="";
templates.forEach(t=>{
tpl_list.innerHTML+=`<div class="small">${t.name}</div><hr>`;
});
}

function renderSelect(){
recipe_item.innerHTML="";
ingredients.forEach(i=>{
let op=document.createElement("option");
op.value=i.name;
op.textContent=i.name;
recipe_item.appendChild(op);
});
}

// ================= 原価（簡易） =================
function calcCost(){
let total=0;

currentItems.forEach(i=>{
let ing=ingredients.find(x=>x.name===i.name);
if(!ing)return;
total+=ing.price*i.amount;
});

cost.innerHTML="合計："+total+"円";
}

</script>

</body>
</html>
