<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Engine 846 - 完全統合最終版</title>

<style>
body{font-family:sans-serif;background:#f6f2ec;margin:0;padding:12px}
h1{font-size:18px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08)}
input,select{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #ccc}
button{padding:6px 8px;margin:2px;border:none;border-radius:6px;background:#6b4f3b;color:white;font-size:12px}
.small{font-size:12px;color:#666}
.tag{display:inline-block;padding:2px 6px;font-size:11px;border-radius:6px;background:#eee}
.step{border-bottom:1px solid #eee;padding:6px 0}
</style>
</head>

<body>

<h1>🏭 Kitchen Engine 846（完全統合最終版）</h1>

<!-- ================= 原材料 ================= -->
<div class="card">
<h3>🧂 原材料マスタ</h3>

<input id="ing_name" placeholder="原材料名">
<input id="ing_brand" placeholder="ブランド（例：シママース）">

<select id="ing_category">
  <option value="">カテゴリ</option>
  <option>原材料</option>
  <option>調味料</option>
  <option>漬け原材料</option>
  <option>ピクルス液</option>
  <option>スパイス</option>
  <option>添加物</option>
  <option>その他</option>
</select>

<input id="ing_qty" type="number" placeholder="規格数量">
<input id="ing_unit" placeholder="単位">
<input id="ing_price" type="number" placeholder="価格（円）">

<button onclick="addIngredient()">原材料追加</button>

<div id="ing_list"></div>
</div>

<!-- ================= レシピ ================= -->
<div class="card">
<h3>📘 レシピ（BOM）</h3>

<input id="recipe_name" placeholder="レシピ名">

<select id="recipe_type">
  <option value="ingredient">原材料</option>
  <option value="recipe">レシピ（再利用）</option>
</select>

<select id="recipe_item"></select>

<input id="recipe_amount" placeholder="使用量（例：500g）">

<select id="process_template">
  <option value="">工程テンプレ選択</option>
  <option>ピクルス基本工程</option>
</select>

<button onclick="addRecipeItem()">追加</button>

<div id="recipe_list"></div>
</div>

<!-- ================= 工程 ================= -->
<div class="card">
<h3>⚙️ 工程実行</h3>
<button onclick="loadProcess()">工程展開</button>
<div id="steps"></div>
</div>

<!-- ================= ロット ================= -->
<div class="card">
<h3>🏭 ロット</h3>

<input id="lot" placeholder="ロット">
<input id="qty" type="number" placeholder="本数">
<input id="ph" placeholder="pH">

<button onclick="finishBatch()">記録</button>
</div>

<!-- ================= 原価 ================= -->
<div class="card">
<h3>💰 原価</h3>
<button onclick="calcCost()">計算</button>
<div id="cost"></div>
</div>

<script>

// ================= データ =================
let ingredients = JSON.parse(localStorage.getItem("ing")||"[]");
let recipes = JSON.parse(localStorage.getItem("rec")||"[]");
let steps = [];
let logs = [];

// ================= 単位正規化 =================
function norm(u){
return (u||"")
.toLowerCase()
.replace(/㎏/g,"kg")
.replace(/ｋｇ/g,"kg")
.replace(/ｇ/g,"g")
.replace(/ｍｌ/g,"ml")
.replace(/ℓ/g,"l")
.replace(/Ｌ/g,"l")
.trim();
}

// ================= 原材料 =================
function addIngredient(){

ingredients.push({
type:"ingredient",
name:ing_name.value,
brand:ing_brand.value,
category:ing_category.value,
qty:Number(ing_qty.value),
unit:norm(ing_unit.value),
price:Number(ing_price.value)
});

save();
render();
select();

// クリア
ing_name.value="";
ing_brand.value="";
ing_category.value="";
ing_qty.value="";
ing_unit.value="";
ing_price.value="";

ing_name.focus();
}

// ================= 保存 =================
function save(){
localStorage.setItem("ing",JSON.stringify(ingredients));
localStorage.setItem("rec",JSON.stringify(recipes));
}

// ================= 表示 =================
function render(){
ing_list.innerHTML="";
ingredients.forEach(i=>{
ing_list.innerHTML+=`
<div class="small">
🧂 <b>${i.name}${i.brand?`（${i.brand}）`:``}</b><br>
${i.category}<br>
${i.qty}${i.unit} / ${i.price}円
</div><hr>`;
});
}

// ================= セレクト =================
function select(){
recipe_item.innerHTML="";

ingredients.forEach(i=>{
let op=document.createElement("option");
op.value=i.name;
op.textContent="🧂 "+i.name;
recipe_item.appendChild(op);
});

recipes.forEach(r=>{
let op=document.createElement("option");
op.value=r.name;
op.textContent="📘 "+r.name;
recipe_item.appendChild(op);
});
}

// ================= レシピ追加 =================
function addRecipeItem(){

let rname = recipe_name.value.trim();
if(!rname){alert("レシピ名必要");return;}

let rec = recipes.find(r=>r.name===rname);
if(!rec){
rec = {name:rname,items:[],process:process_template.value};
recipes.push(rec);
}

rec.items.push({
type:recipe_type.value,
name:recipe_item.value,
amount:recipe_amount.value
});

save();
renderRecipe(rec);
select();
}

// ================= レシピ表示 =================
function renderRecipe(rec){
recipe_list.innerHTML="";

rec.items.forEach(i=>{
recipe_list.innerHTML+=`
<div class="small">
${i.type==="ingredient"?"🧂":"📘"} ${i.name} ${i.amount}
</div>`;
});
}

// ================= 工程テンプレ =================
function loadProcess(){

steps=[
"洗浄",
"刻み",
"茹でこぼし",
"瓶詰",
"キャップ締め",
"加熱",
"pH確認",
"冷却"
];

renderSteps();
}

// ================= 工程 =================
function renderSteps(){
stepsDiv.innerHTML="";
steps.forEach((s,i)=>{
stepsDiv.innerHTML+=`
<div class="step">
${s}<br>
<button onclick="logs.push({step:'${s}',t:'start'})">開始</button>
<button onclick="logs.push({step:'${s}',t:'end'})">終了</button>
</div>`;
});
}

// ================= ロット =================
function finishBatch(){
logs.push({
lot:lot.value,
qty:Number(qty.value),
ph:ph.value
});
alert("記録完了");
}

// ================= 原価 =================
function calcCost(){

let total=0;

recipes.forEach(r=>{
r.items.forEach(i=>{
let ing = ingredients.find(x=>x.name===i.name);
if(!ing)return;

let amt=parseFloat(i.amount)||0;
let base=ing.qty*(ing.unit==="kg"||ing.unit==="l"?1000:1);

total += (ing.price/base)*amt;
});
});

cost.innerHTML=`総原価：${total.toFixed(1)}円`;
}

// ================= 初期 =================
render();
select();

</script>

</body>
</html>
