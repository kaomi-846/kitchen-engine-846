<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Engine 846 </title>

<style>
body{font-family:sans-serif;background:#f6f2ec;margin:0;padding:12px}
h1{font-size:18px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08)}
input,select{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #ccc}
button{padding:6px 8px;margin:2px;border:none;border-radius:6px;background:#6b4f3b;color:white;font-size:12px}
.small{font-size:12px;color:#666}
.step{border-bottom:1px solid #eee;padding:6px 0}
</style>
</head>

<body>

<h1>🏭 Kitchen Engine 846（FINAL MASTER）</h1>

<!-- ================= 製造日 ================= -->
<div class="card">
<h3>📅 製造日</h3>
<input id="prod_date" type="date">
</div>

<!-- ================= 原材料 ================= -->
<div class="card">
<h3>🧂 原材料マスタ</h3>

<input id="ing_name" placeholder="原材料名">
<input id="ing_brand" placeholder="ブランド">

<!-- ✔カテゴリダイアログ復元 -->
<select id="ing_category" onchange="categoryDialog()">
<option value="">カテゴリ選択</option>
<option>原材料</option>
<option>調味料</option>
<option>漬け原材料</option>
<option>ピクルス液</option>
<option>スパイス</option>
<option>添加物</option>
<option>その他</option>
<option value="__add__">＋カテゴリ追加</option>
</select>

<input id="ing_qty" type="number" placeholder="規格数量">
<input id="ing_unit" placeholder="単位">
<input id="ing_price" type="number" placeholder="価格">

<button onclick="addIngredient()">原材料追加</button>

<div id="ing_list"></div>
</div>

<!-- ================= レシピ ================= -->
<div class="card">
<h3>📘 レシピ</h3>

<input id="recipe_name" placeholder="レシピ名">
<select id="recipe_item"></select>
<input id="recipe_amount" placeholder="使用量">

<button onclick="addItem()">材料追加</button>
<button onclick="saveRecipe()">レシピ保存</button>

<div id="recipe_saved"></div>
</div>

<!-- ================= 工程テンプレ ================= -->
<div class="card">
<h3>⚙️ 工程テンプレ</h3>

<input id="tpl_name" placeholder="テンプレ名">
<input id="tpl_steps" placeholder="工程カンマ区切り">

<button onclick="addTemplate()">テンプレ保存</button>
<button onclick="applyTemplate()">適用</button>

<div id="tpl_list"></div>
<div id="steps"></div>
</div>

<!-- ================= 製造情報 ================= -->
<div class="card">
<h3>🏭 製造情報</h3>

<input id="lot_code" placeholder="ロット番号">
<input id="qty" type="number" placeholder="出来高（本数）">
</div>

<!-- ================= 経費 ================= -->
<div class="card">
<h3>💡 経費</h3>

<h4>📦 変動費（1個あたり）</h4>
<input id="cost_bottle_unit" type="number" placeholder="瓶">
<input id="cost_label_unit" type="number" placeholder="ラベル">
<input id="cost_pack_unit" type="number" placeholder="包装">

<h4>🏭 固定費（1製造あたり）</h4>
<input id="cost_labor_batch" type="number" placeholder="人件費">
<input id="cost_utilities_batch" type="number" placeholder="光熱費">
<input id="cost_other_batch" type="number" placeholder="その他">
</div>

<!-- ================= 原価 ================= -->
<div class="card">
<h3>💰 原価計算</h3>
<button onclick="calcCost()">計算</button>
<div id="cost"></div>
</div>

<!-- ================= バックアップ ================= -->
<div class="card">
<h3>☁️ 保存・復元</h3>

<button onclick="backup()">💾 保存</button>
<button onclick="restore()">♻ 復元</button>
<button onclick="exportCSV()">CSV出力</button>

<input type="file" onchange="importFile(event)">

<div id="status"></div>
</div>

<script>

// ================= データ =================
let ingredients=JSON.parse(localStorage.getItem("ing")||"[]");
let recipes=JSON.parse(localStorage.getItem("rec")||"[]");
let templates=JSON.parse(localStorage.getItem("tpl")||"[]");

let currentItems=[];

// ================= 初期 =================
window.onload=function(){
prod_date.value=new Date().toISOString().split("T")[0];
renderAll();
}

// ================= 保存 =================
function save(){
localStorage.setItem("ing",JSON.stringify(ingredients));
localStorage.setItem("rec",JSON.stringify(recipes));
localStorage.setItem("tpl",JSON.stringify(templates));
}

// ================= カテゴリダイアログ復元 =================
function categoryDialog(){

if(ing_category.value==="__add__"){
let newCat=prompt("新しいカテゴリ名を入力してください");
if(newCat){
let opt=document.createElement("option");
opt.textContent=newCat;
opt.value=newCat;
ing_category.insertBefore(opt,ing_category.lastChild);
ing_category.value=newCat;
}
}
}

// ================= 原材料 =================
function addIngredient(){

ingredients.push({
name:ing_name.value,
brand:ing_brand.value,
category:ing_category.value,
qty:Number(ing_qty.value),
unit:ing_unit.value,
price:Number(ing_price.value)
});

save();
renderAll();

ing_name.value="";
ing_brand.value="";
ing_category.value="";
ing_qty.value="";
ing_unit.value="";
ing_price.value="";
}

// ================= レシピ =================
function addItem(){
currentItems.push({
name:recipe_item.value,
amount:Number(recipe_amount.value||0)
});
}

// ================= 保存レシピ =================
function saveRecipe(){
recipes.push({
name:recipe_name.value,
items:currentItems
});
save();
currentItems=[];
renderAll();
}

// ================= 原価 =================
function calcCost(){

let material=0;

currentItems.forEach(i=>{
let ing=ingredients.find(x=>x.name===i.name);
if(!ing)return;

let base=ing.qty*(ing.unit==="kg"||ing.unit==="l"?1000:1);
material+=(ing.price/base)*i.amount;
});

let out=Number(qty.value||0);
if(!out){alert("出来高必須");return;}

let variable=
(Number(cost_bottle_unit.value||0)*out)+
(Number(cost_label_unit.value||0)*out)+
(Number(cost_pack_unit.value||0)*out);

let fixed=
Number(cost_labor_batch.value||0)+
Number(cost_utilities_batch.value||0)+
Number(cost_other_batch.value||0);

let total=material+variable+fixed;
let per=total/out;

cost.innerHTML=`
材料：${material.toFixed(1)}円<br>
変動費：${variable.toFixed(1)}円<br>
固定費：${fixed.toFixed(1)}円<br>
総原価：${total.toFixed(1)}円<br>
1個：${per.toFixed(1)}円`;
}

// ================= 保存 =================
function backup(){
localStorage.setItem("FULL_DATA",JSON.stringify({
ingredients,recipes,templates
}));
status.innerHTML="保存完了";
}

function restore(){
let data=JSON.parse(localStorage.getItem("FULL_DATA")||"{}");
ingredients=data.ingredients||[];
recipes=data.recipes||[];
templates=data.templates||[];
renderAll();
status.innerHTML="復元完了";
}

// ================= CSV =================
function exportCSV(){

let csv="\uFEFF"+JSON.stringify({
ingredients,recipes,templates
},null,2);

let blob=new Blob([csv],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

// ================= 表示 =================
function renderAll(){
renderIng();
renderSelect();
renderRecipes();
renderTemplates();
}

function renderIng(){
ing_list.innerHTML="";
ingredients.forEach(i=>{
ing_list.innerHTML+=`<div class="small">${i.name}（${i.category}）${i.price}円</div><hr>`;
});
}

function renderSelect(){
recipe_item.innerHTML="";
ingredients.forEach(i=>{
let op=document.createElement("option");
op.value=i.name;
op.textContent=i.name;
recipe_item.appendChild(op);
});
}

function renderRecipes(){
recipe_saved.innerHTML="";
recipes.forEach(r=>{
recipe_saved.innerHTML+=`<div class="small">${r.name}</div>`;
});
}

function renderTemplates(){
tpl_list.innerHTML="";
templates.forEach(t=>{
tpl_list.innerHTML+=`<div class="small">${t.name}</div><hr>`;
});
}

</script>

</body>
</html>
