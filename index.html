<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Engine 846 - FINAL ALL IN ONE</title>

<style>
body{font-family:sans-serif;background:#f6f2ec;margin:0;padding:12px}
h1{font-size:18px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08)}
input,select{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #ccc}
button{padding:6px 8px;margin:2px;border:none;border-radius:6px;background:#6b4f3b;color:white;font-size:12px}
.small{font-size:12px;color:#666}
.step{border-bottom:1px solid #eee;padding:6px 0}
</style>
</head>

<body>

<h1>🏭 Kitchen Engine 846（FINAL ALL IN ONE）</h1>

<!-- ================= ① 製造日 ================= -->
<div class="card">
<h3>📅 製造日</h3>
<input id="prod_date" type="date">
</div>

<!-- ================= ② 原材料 ================= -->
<div class="card">
<h3>🧂 原材料マスタ</h3>

<input id="ing_name" placeholder="原材料名">
<input id="ing_brand" placeholder="ブランド">

<select id="ing_category">
<option>原材料</option>
<option>調味料</option>
<option>漬け原材料</option>
<option>ピクルス液</option>
<option>スパイス</option>
<option>添加物</option>
<option>その他</option>
</select>

<input id="ing_qty" type="number" placeholder="規格数量">
<input id="ing_unit" placeholder="単位（kg/g/L/ml/個）">
<input id="ing_price" type="number" placeholder="価格（円）">

<button onclick="addIngredient()">原材料追加</button>
<div id="ing_list"></div>
</div>

<!-- ================= ③ レシピ ================= -->
<div class="card">
<h3>📘 レシピ</h3>

<input id="recipe_name" placeholder="レシピ名">
<select id="recipe_item"></select>
<input id="recipe_amount" placeholder="使用量（数値）">

<button onclick="addItem()">材料追加</button>
<button onclick="saveRecipe()">レシピ保存</button>

<div id="recipe_list"></div>
<div id="recipe_saved"></div>
</div>

<!-- ================= ④ 工程 ================= -->
<div class="card">
<h3>⚙️ 工程</h3>
<button onclick="loadProcess()">工程展開</button>
<div id="steps"></div>
</div>

<!-- ================= ⑤ 製造情報 ================= -->
<div class="card">
<h3>🏭 製造情報</h3>

<input id="lot_code" placeholder="ロット番号">
<input id="qty" type="number" placeholder="出来高">
</div>

<!-- ================= ⑥ 経費 ================= -->
<div class="card">
<h3>💡 経費</h3>

<input id="cost_bottle" type="number" placeholder="瓶代">
<input id="cost_label" type="number" placeholder="ラベル代">
<input id="cost_materials" type="number" placeholder="資材費">
<input id="cost_utilities" type="number" placeholder="光熱費">
<input id="cost_labor" type="number" placeholder="人件費">
<input id="cost_other" type="number" placeholder="その他">
</div>

<!-- ================= ⑦ 原価 ================= -->
<div class="card">
<h3>💰 原価</h3>
<button onclick="calcCost()">計算</button>
<div id="cost"></div>
</div>

<script>

// ================= データ =================
let ingredients=JSON.parse(localStorage.getItem("ing")||"[]");
let recipes=JSON.parse(localStorage.getItem("rec")||"[]");
let currentItems=[];
let processState={};

// ================= 初期 =================
window.onload=function(){
prod_date.value=new Date().toISOString().split("T")[0];
renderIng();
renderSelect();
renderSavedRecipes();
}

// ================= 保存 =================
function save(){
localStorage.setItem("ing",JSON.stringify(ingredients));
localStorage.setItem("rec",JSON.stringify(recipes));
}

// ================= 単位正規化 =================
function normalizeUnit(u){
return (u||"")
.toLowerCase()
.replace(/㎏|ｋｇ/g,"kg")
.replace(/ｇ/g,"g")
.replace(/ｍｌ/g,"ml")
.replace(/ℓ|Ｌ/g,"l")
.trim();
}

// ================= 原材料追加 =================
function addIngredient(){

ingredients.push({
name:ing_name.value,
brand:ing_brand.value,
category:ing_category.value,
qty:Number(ing_qty.value),
unit:normalizeUnit(ing_unit.value),
price:Number(ing_price.value)
});

save();
renderIng();
renderSelect();

// クリア
ing_name.value="";
ing_brand.value="";
ing_qty.value="";
ing_unit.value="";
ing_price.value="";
}

// ================= レシピ追加 =================
function addItem(){

currentItems.push({
name:recipe_item.value,
amount:Number(recipe_amount.value||0)
});

renderRecipe();
}

// ================= レシピ保存 =================
function saveRecipe(){

let name=recipe_name.value.trim();
if(!name){alert("レシピ名必須");return;}

let r=recipes.find(x=>x.name===name);

if(r){
r.items=currentItems;
}else{
recipes.push({name,items:currentItems});
}

save();
currentItems=[];
renderSavedRecipes();
alert("レシピ保存完了");
}

// ================= 工程 =================
let steps=["洗浄","刻み","加熱","冷却"];

function loadProcess(){
stepsDiv.innerHTML="";
steps.forEach(s=>{
stepsDiv.innerHTML+=`
<div class="step">
<b>${s}</b><br>
<button onclick="start('${s}')">開始</button>
<button onclick="end('${s}')">終了</button>
</div>`;
});
}

function start(s){processState[s]=Date.now();loadProcess();}
function end(s){processState[s]=Date.now()-processState[s];loadProcess();}

// ================= 原価計算（完全版） =================
function calcCost(){

let material=0;

// 材料
currentItems.forEach(i=>{

let ing=ingredients.find(x=>x.name===i.name);
if(!ing)return;

let base=ing.qty*(ing.unit==="kg"||ing.unit==="l"?1000:1);

material+=(ing.price/base)*i.amount;

});

// 出来高
let out=Number(qty.value||0);
if(!out){alert("出来高必須");return;}

// 経費
let expense=
Number(cost_bottle.value||0)+
Number(cost_label.value||0)+
Number(cost_materials.value||0)+
Number(cost_utilities.value||0)+
Number(cost_labor.value||0)+
Number(cost_other.value||0);

// 合計
let total=material+expense;

// 単価
let per=total/out;

cost.innerHTML=`
📅 ${prod_date.value}<br>
🏷 ${lot_code.value}<br>
🧂 材料：${material.toFixed(1)}円<br>
💡 経費：${expense.toFixed(1)}円<br>
💰 総原価：${total.toFixed(1)}円<br>
📦 出来高：${out}<br>
🍶 1個：${per.toFixed(1)}円
`;
}

// ================= 表示 =================
function renderIng(){
ing_list.innerHTML="";
ingredients.forEach(i=>{
ing_list.innerHTML+=`
<div class="small">
🧂 ${i.name}（${i.brand||"-"}）<br>
${i.category} / ${i.price}円
</div><hr>`;
});
}

function renderSelect(){
recipe_item.innerHTML="";
ingredients.forEach(i=>{
let op=document.createElement("option");
op.value=i.name;
op.textContent=`${i.name}（${i.brand||""}）`;
recipe_item.appendChild(op);
});
}

function renderRecipe(){
recipe_list.innerHTML="";
currentItems.forEach(i=>{
recipe_list.innerHTML+=`<div class="small">${i.name} ${i.amount}</div>`;
});
}

function renderSavedRecipes(){
recipe_saved.innerHTML="";
recipes.forEach(r=>{
recipe_saved.innerHTML+=`<div class="small">📘 ${r.name}</div>`;
});
}

</script>

</body>
</html>
