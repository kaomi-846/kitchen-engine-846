<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Engine 846 FINAL ULTIMATE</title>

<style>
body{font-family:sans-serif;background:#f6f2ec;margin:0;padding:12px}
h1{font-size:18px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08)}
input,select{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #ccc}
button{padding:6px 8px;margin:2px;border:none;border-radius:6px;background:#6b4f3b;color:white;font-size:12px}
.small{font-size:12px;color:#666}
.step{border-bottom:1px solid #eee;padding:6px 0}
</style>
</head>

<body>

<h1>🏭 Kitchen Engine 846（FINAL ULTIMATE）</h1>

<!-- ================= ① 製造日 ================= -->
<div class="card">
<h3>📅 製造日</h3>
<input id="prod_date" type="date">
</div>

<!-- ================= ② 原材料 ================= -->
<div class="card">
<h3>🧂 原材料マスタ</h3>

<input id="ing_name" placeholder="原材料名">
<input id="ing_brand" placeholder="ブランド">

<select id="ing_category">
<option>原材料</option>
<option>調味料</option>
<option>漬け原材料</option>
<option>ピクルス液</option>
<option>スパイス</option>
<option>添加物</option>
<option>その他</option>
</select>

<input id="ing_qty" type="number" placeholder="規格数量">
<input id="ing_unit" placeholder="単位">
<input id="ing_price" type="number" placeholder="価格">

<button onclick="addIngredient()">追加</button>
<div id="ing_list"></div>
</div>

<!-- ================= ③ レシピ ================= -->
<div class="card">
<h3>📘 レシピ</h3>

<input id="recipe_name" placeholder="レシピ名">
<select id="recipe_item"></select>
<input id="recipe_amount" placeholder="使用量">

<button onclick="addItem()">材料追加</button>
<button onclick="saveRecipe()">レシピ保存</button>

<div id="recipe_list"></div>
<div id="recipe_saved"></div>
</div>

<!-- ================= ④ 工程テンプレ ================= -->
<div class="card">
<h3>⚙️ 工程テンプレート</h3>

<input id="tpl_name" placeholder="テンプレ名">
<input id="tpl_steps" placeholder="工程（カンマ区切り）">

<button onclick="addTemplate()">テンプレ保存</button>

<select id="tpl_select"></select>
<button onclick="applyTemplate()">テンプレ適用</button>

<div id="tpl_list"></div>

<hr>
<h4>現在工程</h4>
<div id="steps"></div>
</div>

<!-- ================= ⑤ 製造情報 ================= -->
<div class="card">
<h3>🏭 製造情報</h3>

<input id="lot_code" placeholder="ロット番号">
<input id="qty" type="number" placeholder="出来高">
</div>

<!-- ================= ⑥ 経費 ================= -->
<div class="card">
<h3>💡 経費</h3>

<h4>📦 変動費（1個）</h4>
<input id="cost_bottle_unit" type="number" placeholder="瓶">
<input id="cost_label_unit" type="number" placeholder="ラベル">
<input id="cost_pack_unit" type="number" placeholder="包装">

<h4>🏭 固定費（1製造）</h4>
<input id="cost_labor_batch" type="number" placeholder="人件費">
<input id="cost_utilities_batch" type="number" placeholder="光熱費">
<input id="cost_other_batch" type="number" placeholder="その他">
</div>

<!-- ================= ⑦ 原価 ================= -->
<div class="card">
<h3>💰 原価</h3>
<button onclick="calcCost()">計算</button>
<div id="cost"></div>
</div>

<script>

// ================= データ =================
let ingredients=JSON.parse(localStorage.getItem("ing")||"[]");
let recipes=JSON.parse(localStorage.getItem("rec")||"[]");
let templates=JSON.parse(localStorage.getItem("tpl")||"[]");

let currentItems=[];
let steps=[];
let processState={};

// ================= 初期 =================
window.onload=function(){
prod_date.value=new Date().toISOString().split("T")[0];
renderIng();
renderSelect();
renderRecipes();
renderTemplateSelect();
renderTemplateList();
}

// ================= 保存 =================
function save(){
localStorage.setItem("ing",JSON.stringify(ingredients));
localStorage.setItem("rec",JSON.stringify(recipes));
localStorage.setItem("tpl",JSON.stringify(templates));
}

// ================= 原材料 =================
function addIngredient(){

ingredients.push({
name:ing_name.value,
brand:ing_brand.value,
category:ing_category.value,
qty:Number(ing_qty.value),
unit:ing_unit.value,
price:Number(ing_price.value)
});

save();
renderIng();
renderSelect();

ing_name.value="";
ing_brand.value="";
ing_qty.value="";
ing_unit.value="";
ing_price.value="";
}

// ================= レシピ =================
function addItem(){
currentItems.push({
name:recipe_item.value,
amount:Number(recipe_amount.value||0)
});
renderRecipe();
}

function saveRecipe(){

let name=recipe_name.value.trim();
if(!name){alert("レシピ名必須");return;}

let r=recipes.find(x=>x.name===name);

if(r){r.items=currentItems;}
else{recipes.push({name,items:currentItems});}

save();
currentItems=[];
renderRecipes();
alert("レシピ保存");
}

function renderRecipes(){
recipe_saved.innerHTML="";
recipes.forEach(r=>{
recipe_saved.innerHTML+=`<div class="small">📘 ${r.name}</div>`;
});
}

function renderRecipe(){
recipe_list.innerHTML="";
currentItems.forEach(i=>{
recipe_list.innerHTML+=`<div class="small">${i.name} ${i.amount}</div>`;
});
}

// ================= 工程テンプレ =================
function addTemplate(){

templates.push({
name:tpl_name.value,
steps:tpl_steps.value.split(",").map(s=>s.trim())
});

save();
renderTemplateSelect();
renderTemplateList();

tpl_name.value="";
tpl_steps.value="";
}

function renderTemplateSelect(){

tpl_select.innerHTML="";

templates.forEach(t=>{
let op=document.createElement("option");
op.value=t.name;
op.textContent=t.name;
tpl_select.appendChild(op);
});
}

function renderTemplateList(){

tpl_list.innerHTML="";

templates.forEach(t=>{
tpl_list.innerHTML+=`
<div class="small">
⚙️ ${t.name}<br>
${t.steps.join(" → ")}
</div><hr>`;
});
}

function applyTemplate(){

let t=templates.find(x=>x.name===tpl_select.value);
if(!t)return;

steps=[...t.steps];
renderSteps();
}

// ================= 工程 =================
function renderSteps(){

stepsDiv.innerHTML="";

steps.forEach(s=>{
stepsDiv.innerHTML+=`
<div class="step">
<b>${s}</b><br>
<button onclick="start('${s}')">開始</button>
<button onclick="end('${s}')">終了</button>
</div>`;
});
}

function start(s){processState[s]=Date.now();}
function end(s){processState[s]=Date.now()-processState[s];}

// ================= 原価 =================
function calcCost(){

let material=0;

currentItems.forEach(i=>{

let ing=ingredients.find(x=>x.name===i.name);
if(!ing)return;

let base=ing.qty*(ing.unit==="kg"||ing.unit==="l"?1000:1);

material+=(ing.price/base)*i.amount;

});

let out=Number(qty.value||0);
if(!out){alert("出来高必須");return;}

// 変動費
let variable=
(Number(cost_bottle_unit.value||0)*out)+
(Number(cost_label_unit.value||0)*out)+
(Number(cost_pack_unit.value||0)*out);

// 固定費
let fixed=
Number(cost_labor_batch.value||0)+
Number(cost_utilities_batch.value||0)+
Number(cost_other_batch.value||0);

let total=material+variable+fixed;
let per=total/out;

cost.innerHTML=`
📦 材料：${material.toFixed(1)}円<br>
📦 変動費：${variable.toFixed(1)}円<br>
🏭 固定費：${fixed.toFixed(1)}円<br>
💰 総原価：${total.toFixed(1)}円<br>
🍶 1個：${per.toFixed(1)}円
`;
}

// ================= 表示 =================
function renderIng(){
ing_list.innerHTML="";
ingredients.forEach(i=>{
ing_list.innerHTML+=`
<div class="small">
🧂 ${i.name}（${i.brand||"-"}） ${i.price}円
</div><hr>`;
});
}

function renderSelect(){
recipe_item.innerHTML="";
ingredients.forEach(i=>{
let op=document.createElement("option");
op.value=i.name;
op.textContent=i.name;
recipe_item.appendChild(op);
});
}

</script>

</body>
</html>
