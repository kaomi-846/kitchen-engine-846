<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Engine 846 - DATE RESTORE FINAL</title>

<style>
body{font-family:sans-serif;background:#f6f2ec;margin:0;padding:12px}
h1{font-size:18px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08)}
input,select{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #ccc}
button{padding:6px 8px;margin:2px;border:none;border-radius:6px;background:#6b4f3b;color:white;font-size:12px}
.small{font-size:12px;color:#666}
.step{border-bottom:1px solid #eee;padding:6px 0}
</style>
</head>

<body>

<h1>🏭 Kitchen Engine 846（DATE RESTORE FINAL）</h1>

<!-- ================= ★製造日（最上部復活） ================= -->
<div class="card">
<h3>📅 製造日</h3>
<input id="prod_date" type="date">
</div>

<!-- ================= 原材料 ================= -->
<div class="card">
<h3>🧂 原材料</h3>

<input id="ing_name" placeholder="原材料名">
<input id="ing_qty" type="number" placeholder="規格数量">
<input id="ing_unit" placeholder="単位">
<input id="ing_price" type="number" placeholder="価格">

<button onclick="addIngredient()">追加</button>

<div id="ing_list"></div>
</div>

<!-- ================= レシピ ================= -->
<div class="card">
<h3>📘 レシピ</h3>

<input id="recipe_name" placeholder="レシピ名">

<select id="recipe_item"></select>

<input id="recipe_amount" placeholder="使用量">

<button onclick="addItem()">追加</button>

<div id="recipe_list"></div>
</div>

<!-- ================= 工程 ================= -->
<div class="card">
<h3>⚙️ 工程</h3>
<button onclick="loadProcess()">工程展開</button>
<div id="steps"></div>
</div>

<!-- ================= 原価 ================= -->
<div class="card">
<h3>💰 原価</h3>
<button onclick="calcCost()">計算</button>
<div id="cost"></div>
</div>

<!-- ================= 製造情報 ================= -->
<div class="card">
<h3>🏭 製造情報</h3>

<input id="lot_code" placeholder="ロット番号（例 A001）">
<input id="qty" type="number" placeholder="出来高">

</div>

<script>

// ================= データ =================
let ingredients = JSON.parse(localStorage.getItem("ing")||"[]");
let recipes = JSON.parse(localStorage.getItem("rec")||"[]");
let processState = {};
let currentItems = [];

// ================= 初期日付（最重要復活） =================
window.onload=function(){

let d=new Date();
let y=d.getFullYear();
let m=String(d.getMonth()+1).padStart(2,"0");
let day=String(d.getDate()).padStart(2,"0");

prod_date.value=`${y}-${m}-${day}`;
}

// ================= 保存 =================
function save(){
localStorage.setItem("ing",JSON.stringify(ingredients));
localStorage.setItem("rec",JSON.stringify(recipes));
}

// ================= ★日付キー =================
function getDateKey(){
return prod_date.value.replaceAll("-","");
}

// ================= ★ロット生成（復活） =================
function makeLot(){
return getDateKey() + "-" + lot_code.value;
}

// ================= 原材料 =================
function addIngredient(){

ingredients.push({
name:ing_name.value,
qty:Number(ing_qty.value),
unit:ing_unit.value,
price:Number(ing_price.value)
});

save();
renderIng();
renderSelect();

ing_name.value="";
ing_qty.value="";
ing_unit.value="";
ing_price.value="";
}

// ================= レシピ =================
function addItem(){

currentItems.push({
name:recipe_item.value,
amount:parseFloat(recipe_amount.value)
});

renderRecipe();
}

// ================= 工程 =================
let steps=["洗浄","刻み","茹でこぼし","瓶詰","加熱","冷却"];

function loadProcess(){

stepsDiv.innerHTML="";

steps.forEach(s=>{
stepsDiv.innerHTML+=`
<div class="step">
<b>${s}</b><br>
<button onclick="start('${s}')">開始</button>
<button onclick="end('${s}')">終了</button>
</div>`;
});
}

function start(s){
processState[s]=Date.now();
loadProcess();
}

function end(s){
processState[s]=Date.now()-processState[s];
loadProcess();
}

// ================= 原価（出来高連動） =================
function calcCost(){

let total=0;

currentItems.forEach(i=>{

let ing=ingredients.find(x=>x.name===i.name);
if(!ing)return;

let base=ing.qty*(ing.unit==="kg"||ing.unit==="l"?1000:1);

total+=(ing.price/base)*i.amount;

});

// ★出来高必須
let out=Number(qty.value);
if(!out){
alert("出来高必須");
return;
}

// ★ロット（日付復活）
let lot=makeLot();

// ★単価
let per=total/out;

cost.innerHTML=`
📅 製造日：${getDateKey()}<br>
🏷 ロット：${lot}<br>
💰 総原価：${total.toFixed(1)}円<br>
📦 出来高：${out}<br>
🍶 1個原価：${per.toFixed(1)}円
`;
}

// ================= 表示 =================
function renderIng(){
ing_list.innerHTML="";
ingredients.forEach(i=>{
ing_list.innerHTML+=`
<div class="small">
🧂 ${i.name} ${i.qty}${i.unit} / ${i.price}円
</div><hr>`;
});
}

// ================= セレクト =================
function renderSelect(){
recipe_item.innerHTML="";
ingredients.forEach(i=>{
let op=document.createElement("option");
op.value=i.name;
op.textContent=i.name;
recipe_item.appendChild(op);
});
}

// ================= レシピ =================
function renderRecipe(){
recipe_list.innerHTML="";
currentItems.forEach(i=>{
recipe_list.innerHTML+=`
<div class="small">${i.name} ${i.amount}</div>`;
});
}

// ================= 初期 =================
renderIng();
renderSelect();

</script>

</body>
</html>
