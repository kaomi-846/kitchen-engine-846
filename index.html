<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Engine 846 - DATE FIRST FINAL</title>

<style>
body{font-family:sans-serif;background:#f6f2ec;margin:0;padding:12px}
h1{font-size:18px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.08)}
input,select{width:100%;padding:8px;margin:4px 0;border-radius:6px;border:1px solid #ccc}
button{padding:6px 8px;margin:2px;border:none;border-radius:6px;background:#6b4f3b;color:white;font-size:12px}
.small{font-size:12px;color:#666}
.step{border-bottom:1px solid #eee;padding:6px 0}
</style>
</head>

<body>

<h1>🏭 Kitchen Engine 846（DATE FIRST FINAL）</h1>

<!-- ================= 製造日（最上部） ================= -->
<div class="card">
<h3>📅 製造日</h3>
<input id="prod_date" type="date">
</div>

<!-- ================= 原材料 ================= -->
<div class="card">
<h3>🧂 原材料</h3>

<input id="ing_name" placeholder="原材料名">
<input id="ing_brand" placeholder="ブランド">
<input id="ing_qty" type="number" placeholder="規格数量">
<input id="ing_unit" placeholder="単位">
<input id="ing_price" type="number" placeholder="価格">

<button onclick="addIngredient()">追加</button>

<div id="ing_list"></div>
</div>

<!-- ================= レシピ ================= -->
<div class="card">
<h3>📘 レシピ</h3>

<input id="recipe_name" placeholder="レシピ名">

<select id="recipe_type">
<option value="ingredient">原材料</option>
<option value="recipe">レシピ再利用</option>
</select>

<select id="recipe_item"></select>

<input id="recipe_amount" placeholder="使用量">

<button onclick="addItem()">材料追加</button>
<button onclick="saveRecipe()">保存</button>

<div id="recipe_list"></div>
</div>

<!-- ================= 工程 ================= -->
<div class="card">
<h3>⚙️ 工程</h3>
<button onclick="loadProcess()">工程展開</button>
<div id="steps"></div>
</div>

<!-- ================= 原価（製造情報の下） ================= -->
<div class="card">
<h3>💰 原価</h3>
<button onclick="calcCost()">計算</button>
<div id="cost"></div>
</div>

<!-- ================= 製造情報（原価の下） ================= -->
<div class="card">
<h3>🏭 製造情報</h3>

<input id="lot_code" placeholder="ロット番号（例 A001）">
<input id="qty" type="number" placeholder="出来高">
<input id="ph" placeholder="pH">
<input id="temp" placeholder="気温">
<input id="weather" placeholder="天候">

</div>

<!-- ================= バックアップ ================= -->
<div class="card">
<h3>💾 バックアップ</h3>
<button onclick="exportData()">出力</button>
<input type="file" onchange="importData(event)">
</div>

<script>

// ================= データ =================
let ingredients = JSON.parse(localStorage.getItem("ing")||"[]");
let recipes = JSON.parse(localStorage.getItem("rec")||"[]");
let logs = [];
let processState = {};

// ================= 初期日付 =================
window.onload=function(){

let d=new Date();
let y=d.getFullYear();
let m=String(d.getMonth()+1).padStart(2,"0");
let day=String(d.getDate()).padStart(2,"0");

prod_date.value=`${y}-${m}-${day}`;
}

// ================= 保存 =================
function save(){
localStorage.setItem("ing",JSON.stringify(ingredients));
localStorage.setItem("rec",JSON.stringify(recipes));
localStorage.setItem("logs",JSON.stringify(logs));
}

// ================= 製造日取得 =================
function getDateKey(){
return prod_date.value.replaceAll("-","");
}

// ================= ロット生成 =================
function makeLot(){
return getDateKey() + "-" + lot_code.value;
}

// ================= 原材料 =================
function addIngredient(){

ingredients.push({
name:ing_name.value,
brand:ing_brand.value,
qty:Number(ing_qty.value),
unit:ing_unit.value,
price:Number(ing_price.value)
});

save();
renderIng();
renderSelect();

ing_name.value="";
ing_brand.value="";
ing_qty.value="";
ing_unit.value="";
ing_price.value="";
ing_name.focus();
}

// ================= レシピ =================
function getRecipe(){
let name=recipe_name.value.trim();
if(!name) return null;

let r=recipes.find(x=>x.name===name);
if(!r){
r={name,items:[],process:[]};
recipes.push(r);
}
return r;
}

// ================= 材料追加 =================
function addItem(){

let r=getRecipe();
if(!r){alert("レシピ名");return;}

let name=recipe_item.value;
let amt=recipe_amount.value;

if(!name||!amt){alert("未入力");return;}

r.items.push({name,amount:amt});

renderRecipe(r);
renderSelect();

recipe_item.value="";
recipe_amount.value="";
}

// ================= 工程 =================
let steps=["洗浄","刻み","茹でこぼし","瓶詰","加熱","冷却"];

function loadProcess(){
stepsDiv.innerHTML="";

steps.forEach(s=>{
stepsDiv.innerHTML+=`
<div class="step">
<b>${s}</b><br>
<button onclick="start('${s}')">開始</button>
<button onclick="end('${s}')">終了</button>
</div>`;
});
}

function start(s){
processState[s]=Date.now();
loadProcess();
}

function end(s){
processState[s]=Date.now()-processState[s];
loadProcess();
}

// ================= ロット保存 =================
function finishBatch(){

let lot = makeLot();

logs.push({
lot,
date:getDateKey(),
qty:Number(qty.value),
ph:ph.value,
temp:temp.value,
weather:weather.value,
process:processState
});

save();

alert("保存完了：" + lot);
}

// ================= 原価 =================
function calcCost(){

let total=0;

recipes.forEach(r=>{
r.items.forEach(i=>{
let ing=ingredients.find(x=>x.name===i.name);
if(!ing)return;

let base=ing.qty*(ing.unit==="kg"||ing.unit==="l"?1000:1);
total+=(ing.price/base)*parseFloat(i.amount);
});
});

cost.innerHTML=`総原価：${total.toFixed(1)}円`;
}

// ================= 表示 =================
function renderIng(){
ing_list.innerHTML="";
ingredients.forEach(i=>{
ing_list.innerHTML+=`
<div class="small">
🧂 ${i.name} ${i.brand?`（${i.brand}）`:``}<br>
${i.qty}${i.unit} / ${i.price}円
</div><hr>`;
});
}

// ================= セレクト =================
function renderSelect(){
recipe_item.innerHTML="";
ingredients.forEach(i=>{
let op=document.createElement("option");
op.value=i.name;
op.textContent=i.name;
recipe_item.appendChild(op);
});
}

// ================= レシピ =================
function renderRecipe(r){
recipe_list.innerHTML="";
if(!r)return;

r.items.forEach(i=>{
recipe_list.innerHTML+=`<div class="small">${i.name} ${i.amount}</div>`;
});
}

// ================= バックアップ =================
function exportData(){
const data={ingredients,recipes,logs};

const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
const url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="backup.json";
a.click();
}

// ================= 復元 =================
function importData(e){

let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(ev){
let data=JSON.parse(ev.target.result);

ingredients=data.ingredients||[];
recipes=data.recipes||[];
logs=data.logs||[];

save();
renderIng();
renderSelect();

alert("復元完了");
};

reader.readAsText(file);
}

// ================= 初期 =================
renderIng();
renderSelect();

</script>

</body>
</html>
