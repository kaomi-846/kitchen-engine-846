<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Engine 846 - 完全統合版</title>

<style>
body{
  font-family:sans-serif;
  background:#f6f2ec;
  margin:0;
  padding:12px;
}

h1{font-size:18px}

.card{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

input,select,textarea{
  width:100%;
  padding:8px;
  margin:4px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:6px 8px;
  margin:2px;
  border:none;
  border-radius:6px;
  background:#6b4f3b;
  color:white;
  font-size:12px;
}

.small{font-size:12px;color:#666}

.tag{
  display:inline-block;
  padding:2px 6px;
  font-size:11px;
  border-radius:6px;
  background:#eee;
  margin-left:4px;
}

.step{
  border-bottom:1px solid #eee;
  padding:6px 0;
}
</style>
</head>

<body>

<h1>🏭 Kitchen Engine 846（完全統合マスタ版）</h1>

<!-- ================= 原材料マスタ ================= -->
<div class="card">
<h3>🧂 原材料マスタ</h3>

<input id="i_name" placeholder="原材料名（砂糖・酢など）">
<input id="i_price" placeholder="価格（例：320）">
<input id="i_unit" placeholder="単位（kg / L / 個）">

<select id="i_category">
  <option>原材料</option>
  <option>調味料</option>
  <option>漬け原材料</option>
  <option>ピクルス液</option>
  <option>スパイス</option>
  <option>添加物</option>
  <option>その他</option>
</select>

<button onclick="addIngredient()">原材料追加</button>

<select id="filter" onchange="renderIngredients()">
  <option value="ALL">全て表示</option>
  <option>原材料</option>
  <option>調味料</option>
  <option>漬け原材料</option>
  <option>ピクルス液</option>
  <option>スパイス</option>
  <option>添加物</option>
  <option>その他</option>
</select>

<div id="ingredient_list"></div>
</div>

<!-- ================= レシピ作成 ================= -->
<div class="card">
<h3>📘 レシピ作成</h3>

<input id="r_name" placeholder="レシピ名">

<select id="ing_select"></select>
<input id="ing_amount" placeholder="使用量（例：500g / 1kg / 2個）">
<button onclick="addItem()">材料追加</button>

<div id="temp_items"></div>

<textarea id="r_process" placeholder="工程（レシピ用メモ）"></textarea>
</div>

<!-- ================= テンプレ ================= -->
<div class="card">
<h3>⚙️ 工程テンプレ</h3>

<input id="tpl_name" placeholder="テンプレ名">
<button onclick="saveTemplate()">テンプレ保存</button>
<button onclick="runTemplate()">テンプレ実行</button>

<div id="step_list"></div>
</div>

<!-- ================= 製造 ================= -->
<div class="card">
<h3>🏭 製造ロット</h3>

<input id="lot" placeholder="ロット番号">
<input id="qty" placeholder="本数">
<input id="ph" placeholder="pH">

<button onclick="finishBatch()">製造完了</button>
</div>

<!-- ================= 原価 ================= -->
<div class="card">
<h3>💰 原価</h3>

<button onclick="calcCost()">原価計算</button>
<div id="result"></div>
</div>

<script>

// ================= データ =================
let ingredients = JSON.parse(localStorage.getItem("ke_ing") || "[]");
let templates = JSON.parse(localStorage.getItem("ke_tpl") || "[]");

let tempItems = [];
let steps = [];
let activeTemplate = null;

// ================= 単位変換 =================
function normalize(str){

  let m=str.match(/([\d.]+)\s*(kg|g|L|ml|個)?/i);
  if(!m) return {v:0,u:"g"};

  let v=parseFloat(m[1]);
  let u=m[2]||"g";

  if(u==="kg") return {v:v*1000,u:"g"};
  if(u==="g") return {v:v,u:"g"};
  if(u==="L") return {v:v*1000,u:"ml"};
  if(u==="ml") return {v:v,u:"ml"};
  if(u==="個") return {v:v,u:"個"};

  return {v,u};
}

// ================= 原材料追加 =================
function addIngredient(){

  ingredients.push({
    name:i_name.value,
    price:Number(i_price.value),
    unit:i_unit.value,
    category:i_category.value
  });

  localStorage.setItem("ke_ing",JSON.stringify(ingredients));

  i_name.value="";
  i_price.value="";
  i_unit.value="";

  renderIngredients();
  renderSelect();
}

// ================= 表示 =================
function renderIngredients(){

  let el=document.getElementById("ingredient_list");
  el.innerHTML="";

  let filter=document.getElementById("filter").value;

  ingredients.forEach(i=>{
    if(filter!=="ALL" && i.category!==filter) return;

    el.innerHTML+=`
      <div class="small">
        ${i.name}
        <span class="tag">${i.category}</span>
        / ${i.price}円 / ${i.unit}
      </div>`;
  });
}

// ================= セレクト =================
function renderSelect(){

  let sel=document.getElementById("ing_select");
  sel.innerHTML="";

  ingredients.forEach((i,idx)=>{
    let opt=document.createElement("option");
    opt.value=idx;
    opt.textContent=i.name;
    sel.appendChild(opt);
  });
}

// ================= 材料追加 =================
function addItem(){

  let ing=ingredients[ing_select.value];
  let amt=normalize(ing_amount.value);

  tempItems.push({
    name:ing.name,
    amount:amt.v,
    unit:amt.u,
    price:ing.price
  });

  ing_amount.value="";
  renderTemp();
}

// ================= 表示 =================
function renderTemp(){

  let el=document.getElementById("temp_items");
  el.innerHTML="";

  tempItems.forEach(i=>{
    el.innerHTML+=`
      <div class="small">
        ${i.name} ${i.amount}${i.unit}
      </div>`;
  });
}

// ================= テンプレ保存 =================
function saveTemplate(){

  let name=tpl_name.value;
  if(!name) return;

  templates.push({
    name:name,
    steps:steps.length?steps:[
      {name:"水洗い",status:"待機"},
      {name:"刻み",status:"待機"},
      {name:"茹でこぼし",status:"待機"},
      {name:"瓶詰",status:"待機"},
      {name:"加熱殺菌",status:"待機"},
      {name:"pH確認",status:"待機"},
      {name:"冷却",status:"待機"}
    ]
  });

  localStorage.setItem("ke_tpl",JSON.stringify(templates));

  tpl_name.value="";
  alert("テンプレ保存完了");
}

// ================= テンプレ実行 =================
function runTemplate(){

  if(!templates.length){
    alert("テンプレなし");
    return;
  }

  activeTemplate=templates[0];
  steps=JSON.parse(JSON.stringify(activeTemplate.steps));

  renderSteps();
}

// ================= 工程表示 =================
function renderSteps(){

  let el=document.getElementById("step_list");
  el.innerHTML="";

  steps.forEach((s,i)=>{

    el.innerHTML+=`
      <div class="step">
        <b>${s.name}</b><br>
        状態：${s.status||"待機"}<br>

        <button onclick="start(${i})">開始</button>
        <button onclick="end(${i})">終了</button>
      </div>
    `;
  });
}

// ================= 工程操作 =================
function start(i){
  steps[i].start=new Date().toLocaleString();
  steps[i].status="進行中";
  renderSteps();
}

// ================= 終了 =================
function end(i){
  steps[i].end=new Date().toLocaleString();
  steps[i].status="完了";
  renderSteps();
}

// ================= 原価計算 =================
function calcCost(){

  let qty=Number(qty.value||0);
  let material=0;

  tempItems.forEach(i=>{

    let cost=0;

    if(i.unit==="g") cost=i.price/1000;
    if(i.unit==="ml") cost=i.price/1000;
    if(i.unit==="個") cost=i.price;

    material+=cost*i.amount;
  });

  let processCost=steps.length*5;

  let total=material+processCost;
  let per=total/(qty||1);

  document.getElementById("result").innerHTML=`
    🧂 材料：${material.toFixed(1)}円<br>
    ⚙️ 工程：${processCost}円<br>
    💰 合計：${total.toFixed(1)}円<br>
    📦 1個：${per.toFixed(1)}円
  `;
}

// ================= 初期 =================
renderIngredients();
renderSelect();

</script>

</body>
</html>
